name: footnote
region: sfo
services:
  - name: backend
    github:
      repo: Purplecannon/footnote
      branch: prep
      deploy_on_push: true
    source_dir: footnote-backend/
    dockerfile_path: footnote-backend/Dockerfile
    http_port: 5000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DB_HOST
        scope: RUN_TIME
        value: ${footnote-mysql-db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${footnote-mysql-db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${footnote-mysql-db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        value: ${footnote-mysql-db.PASSWORD}
      - key: DB_DATABASE
        scope: RUN_TIME
        value: ${footnote-mysql-db.DATABASE}
      - key: DB_SSL__CA
        scope: RUN_TIME
        value: ${footnote-mysql-db.CA_CERT}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DB_SUFFIX
        scope: RUN_TIME
        value: prod
      - key: DO_SPACES_THUMBNAIL_BUCKET
        scope: RUN_TIME
        value: footnote-thumbnails
      - key: DO_SPACES_BUCKET
        scope: RUN_TIME
        value: footnote-videos
      - key: DO_SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
